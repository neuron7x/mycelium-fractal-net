<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <style>
      @keyframes pulse1 {
        0%, 100% { r: 20; opacity: 0.8; }
        50% { r: 180; opacity: 0.1; }
      }
      @keyframes pulse2 {
        0%, 100% { r: 40; opacity: 0.6; }
        50% { r: 220; opacity: 0.08; }
      }
      @keyframes pulse3 {
        0%, 100% { r: 10; opacity: 0.7; }
        50% { r: 160; opacity: 0.12; }
      }
      @keyframes pulse4 {
        0%, 100% { r: 30; opacity: 0.5; }
        50% { r: 200; opacity: 0.06; }
      }
      @keyframes drift1 {
        0% { opacity: 0; transform: translateY(0); }
        15% { opacity: 0.6; }
        85% { opacity: 0.6; }
        100% { opacity: 0; transform: translateY(-12px); }
      }
      @keyframes drift2 {
        0% { opacity: 0; transform: translateY(0); }
        20% { opacity: 0.5; }
        80% { opacity: 0.5; }
        100% { opacity: 0; transform: translateY(-10px); }
      }
      @keyframes drift3 {
        0% { opacity: 0; transform: translateY(0); }
        25% { opacity: 0.55; }
        75% { opacity: 0.55; }
        100% { opacity: 0; transform: translateY(-14px); }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.25; }
        50% { opacity: 0.4; }
      }
      .wave { fill: none; stroke-width: 0.6; }
      .w1 { stroke: #0a5a3a; }
      .w2 { stroke: #0d6b44; }
      .w3 { stroke: #10804f; }
      .w4 { stroke: #15955c; }
      .w5 { stroke: #1aaa6a; }
      .w6 { stroke: #22be78; }
      .w7 { stroke: #00c896; }
      .num {
        font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace;
        font-size: 11px;
        fill: #ffffff;
      }
      .title {
        font-family: 'Helvetica Neue', 'Inter', Arial, sans-serif;
        fill: #ffffff;
        font-size: 16px;
        letter-spacing: 8px;
        font-weight: 300;
      }
      .subtitle {
        font-family: 'Helvetica Neue', 'Inter', Arial, sans-serif;
        fill: #00c896;
        font-size: 9px;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <rect width="1200" height="400" fill="#080808"/>

  <!-- Wave source 1 -->
  <circle cx="200" cy="180" class="wave w1" style="animation: pulse1 8s ease-in-out infinite"/>
  <circle cx="200" cy="180" class="wave w2" style="animation: pulse1 8s ease-in-out 0.4s infinite"/>
  <circle cx="200" cy="180" class="wave w3" style="animation: pulse1 8s ease-in-out 0.8s infinite"/>
  <circle cx="200" cy="180" class="wave w4" style="animation: pulse1 8s ease-in-out 1.2s infinite"/>
  <circle cx="200" cy="180" class="wave w5" style="animation: pulse1 8s ease-in-out 1.6s infinite"/>
  <circle cx="200" cy="180" class="wave w6" style="animation: pulse1 8s ease-in-out 2.0s infinite"/>
  <circle cx="200" cy="180" class="wave w7" style="animation: pulse1 8s ease-in-out 2.4s infinite"/>

  <!-- Wave source 2 -->
  <circle cx="750" cy="150" class="wave w1" style="animation: pulse2 8s ease-in-out 1s infinite"/>
  <circle cx="750" cy="150" class="wave w2" style="animation: pulse2 8s ease-in-out 1.5s infinite"/>
  <circle cx="750" cy="150" class="wave w3" style="animation: pulse2 8s ease-in-out 2.0s infinite"/>
  <circle cx="750" cy="150" class="wave w4" style="animation: pulse2 8s ease-in-out 2.5s infinite"/>
  <circle cx="750" cy="150" class="wave w5" style="animation: pulse2 8s ease-in-out 3.0s infinite"/>
  <circle cx="750" cy="150" class="wave w6" style="animation: pulse2 8s ease-in-out 3.5s infinite"/>

  <!-- Wave source 3 -->
  <circle cx="1000" cy="100" class="wave w1" style="animation: pulse3 8s ease-in-out 2s infinite"/>
  <circle cx="1000" cy="100" class="wave w2" style="animation: pulse3 8s ease-in-out 2.5s infinite"/>
  <circle cx="1000" cy="100" class="wave w3" style="animation: pulse3 8s ease-in-out 3.0s infinite"/>
  <circle cx="1000" cy="100" class="wave w4" style="animation: pulse3 8s ease-in-out 3.5s infinite"/>
  <circle cx="1000" cy="100" class="wave w5" style="animation: pulse3 8s ease-in-out 4.0s infinite"/>

  <!-- Wave source 4 -->
  <circle cx="400" cy="300" class="wave w1" style="animation: pulse4 8s ease-in-out 3s infinite"/>
  <circle cx="400" cy="300" class="wave w2" style="animation: pulse4 8s ease-in-out 3.4s infinite"/>
  <circle cx="400" cy="300" class="wave w3" style="animation: pulse4 8s ease-in-out 3.8s infinite"/>
  <circle cx="400" cy="300" class="wave w4" style="animation: pulse4 8s ease-in-out 4.2s infinite"/>
  <circle cx="400" cy="300" class="wave w5" style="animation: pulse4 8s ease-in-out 4.6s infinite"/>

  <!-- Wave source 5 -->
  <circle cx="580" cy="220" class="wave w2" style="animation: pulse1 8s ease-in-out 4s infinite"/>
  <circle cx="580" cy="220" class="wave w4" style="animation: pulse1 8s ease-in-out 4.6s infinite"/>
  <circle cx="580" cy="220" class="wave w6" style="animation: pulse1 8s ease-in-out 5.2s infinite"/>

  <!-- Drifting numbers -->
  <text x="120" y="120" class="num" style="animation: drift1 8s ease-in-out infinite">&#x2212;71.2 mV</text>
  <text x="320" y="85" class="num" style="animation: drift2 8s ease-in-out 1s infinite">&#x03B1; = 0.18</text>
  <text x="520" y="140" class="num" style="animation: drift3 8s ease-in-out 2s infinite">D_box = 1.549</text>
  <text x="850" y="95" class="num" style="animation: drift1 8s ease-in-out 3s infinite">&#x03C3;&#x00B2; &#x2192; 0</text>
  <text x="680" y="260" class="num" style="animation: drift2 8s ease-in-out 4s infinite">E_K = &#x2212;89.0 mV</text>
  <text x="150" y="250" class="num" style="animation: drift3 8s ease-in-out 5s infinite">LZC = 0.833</text>
  <text x="950" y="200" class="num" style="animation: drift1 8s ease-in-out 6s infinite">&#x2202;u/&#x2202;t = &#x03B1;&#x2207;&#x00B2;u</text>
  <text x="450" y="200" class="num" style="animation: drift2 8s ease-in-out 2.5s infinite">&#x03A6; &gt; 0</text>
  <text x="780" y="320" class="num" style="animation: drift3 8s ease-in-out 0.5s infinite">&#x03C1;_rest + &#x03C1;_active = 1</text>
  <text x="280" y="310" class="num" style="animation: drift1 8s ease-in-out 7s infinite">r(t) = 0.94</text>
  <text x="1020" y="280" class="num" style="animation: drift2 8s ease-in-out 3.5s infinite">CFL &#x2264; 0.25</text>
  <text x="600" y="60" class="num" style="animation: drift3 8s ease-in-out 1.5s infinite">42 causal rules</text>

  <!-- Title -->
  <text x="600" y="355" class="title" text-anchor="middle" style="animation: glow 8s ease-in-out infinite">
    M Y C E L I U M F R A C T A L N E T
  </text>

  <!-- Subtitle -->
  <text x="600" y="378" class="subtitle" text-anchor="middle" opacity="0.35">
    morphology-aware field intelligence &#x00B7; causal validation &#x00B7; reaction-diffusion
  </text>
</svg>
